<head>
<meta charset="UTF-8">

<title>Carte Industrie du Verre — Artelia Industrie</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --creux:   #1A4FA0;
    --plat:    #0E8C5A;
    --laine:   #C0560E;
    --artelia: #7B2FBE;
    --bg:      #F5F4F0;
    --surface: #FFFFFF;
    --border:  #E2E0D8;
    --text:    #1C1C1A;
    --muted:   #7A7870;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 11px 20px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
  .header-title h1 { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
  .header-title p  { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .badge { font-family: 'DM Mono', monospace; font-size: 10px; padding: 3px 8px; border-radius: 4px; background: var(--bg); border: 1px solid var(--border); color: var(--muted); white-space: nowrap; margin-left: auto; }
  .main { display: flex; flex: 1; overflow: hidden; }
  .sidebar { width: 230px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-section { padding: 14px 14px 10px; border-bottom: 1px solid var(--border); }
  .section-label { font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .filter-grid { display: flex; flex-direction: column; gap: 3px; }
  .filter-btn { display: flex; align-items: center; gap: 9px; padding: 7px 9px; border-radius: 7px; border: 1px solid transparent; background: transparent; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--text); text-align: left; transition: background 0.12s; }
  .filter-btn:hover { background: var(--bg); }
  .filter-btn.active { background: var(--bg); border-color: var(--border); font-weight: 500; }
  .filter-count { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
  .legend-block { display: flex; flex-direction: column; gap: 8px; }
  .legend-row { display: flex; align-items: center; gap: 9px; font-size: 11px; color: var(--text); }
  .legend-shape { width: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .sites-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .site-item { padding: 7px 14px; cursor: pointer; border-left: 3px solid transparent; transition: background 0.1s; font-size: 12px; }
  .site-item:hover { background: var(--bg); }
  .site-name { font-weight: 500; }
  .site-meta { font-size: 10px; color: var(--muted); margin-top: 1px; font-family: 'DM Mono', monospace; }
  .no-results { padding: 20px 14px; font-size: 12px; color: var(--muted); text-align: center; }
  .sites-list::-webkit-scrollbar { width: 4px; }
  .sites-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  #map { flex: 1; }
  .leaflet-popup-content-wrapper { border-radius: 10px !important; box-shadow: 0 4px 20px rgba(0,0,0,0.11) !important; border: 1px solid var(--border) !important; padding: 0 !important; overflow: hidden; font-family: 'DM Sans', sans-serif !important; min-width: 180px; }
  .leaflet-popup-content { margin: 0 !important; width: auto !important; }
  .leaflet-popup-tip, .leaflet-popup-close-button { display: none !important; }
  .popup-inner { padding: 10px 13px; }
  .popup-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
  .popup-acteur { font-size: 10px; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.05em; }
  .popup-segment { font-size: 11px; color: var(--muted); margin-top: 4px; }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>Industrie du Verre — Sites de production</h1>
    <p>~49 sites · France & Belgique · Source : ADEME / GEREP / Sites officiels</p>
  </div>
  <span class="badge">Artelia Industrie · 2026</span>
</header>

<div class="main">
  <div class="sidebar">

    <div class="sidebar-section">
      <div class="section-label">Filtres</div>
      <div class="filter-grid">
        <button class="filter-btn active" data-filter="all">
          <svg width="12" height="12"><circle cx="6" cy="6" r="5" fill="#888"/></svg>
          Tous les sites
          <span class="filter-count" id="count-all"></span>
        </button>
        <button class="filter-btn" data-filter="creux">
          <svg width="12" height="12"><circle cx="6" cy="6" r="5" fill="var(--creux)"/></svg>
          Verre creux

        </button>
        <button class="filter-btn" data-filter="plat">

          Verre plat
          <span class="filter-count" id="count-plat"></span>
        </button>
        <button class="filter-btn" data-filter="laine">

          Laine de verre
          <span class="filter-count" id="count-laine"></span>
        </button>
        <button class="filter-btn" data-filter="artelia">
          <svg width="12" height="12"><polygon points="6,1 11,11 1,11" fill="var(--artelia)"/></svg>
          Artelia Industrie
          <span class="filter-count" id="count-artelia"></span>
        </button>
        <button class="filter-btn" data-filter="verre" style="margin-top:6px; padding-top:10px; border-top:1px solid var(--border);">
          <svg width="12" height="12"><circle cx="6" cy="6" r="5" fill="#555"/></svg>
          Tous sites verriers
          <span class="filter-count" id="count-verre"></span>
        </button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-label">Légende</div>
      <div class="legend-block">
        <div class="legend-row">
          <div class="legend-shape"><svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="var(--creux)" stroke="white" stroke-width="1.5"/></svg></div>
          <span>Verre creux</span>
        </div>
        <div class="legend-row">
          <div class="legend-shape"><svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="var(--plat)" stroke="white" stroke-width="1.5"/></svg></div>
          <span>Verre plat</span>
        </div>
        <div class="legend-row">
          <div class="legend-shape"><svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="var(--laine)" stroke="white" stroke-width="1.5"/></svg></div>
          <span>Laine de verre</span>
        </div>
        <div class="legend-row" style="margin-top:4px; padding-top:8px; border-top:1px solid var(--border);">
          <div class="legend-shape"><svg width="14" height="14"><polygon points="7,1 13,13 1,13" fill="var(--artelia)" stroke="white" stroke-width="1"/></svg></div>
          <span>Artelia Industrie</span>
        </div>
      </div>
    </div>

    <div class="sidebar-section" style="padding-bottom:6px; flex-shrink:0;">
      <div class="section-label">Sites (<span id="list-count">—</span>)</div>
    </div>
    <div class="sites-list" id="sitesList"></div>

  </div>
  <div id="map"></div>
</div>

function makeIcon(s) {
  const c = COLORS[s.segment];
  let svg;
  if (s.segment === 'artelia') {
    svg = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
      <polygon points="8,1 15,15 1,15" fill="${c}" stroke="white" stroke-width="1.5"/>
    </svg>`;
    return L.divIcon({ html: svg, className: '', iconSize: [16,16], iconAnchor: [8,15], popupAnchor: [0,-12] });
  } else {
    svg = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14">
      <circle cx="7" cy="7" r="6" fill="${c}" stroke="white" stroke-width="1.5"/>
    </svg>`;
    return L.divIcon({ html: svg, className: '', iconSize: [14,14], iconAnchor: [7,7], popupAnchor: [0,-10] });
  }
}

const segmentLabel = { creux:'Verre creux', plat:'Verre plat', laine:'Laine de verre', artelia:'Artelia Industrie' };

function makePopup(s) {
  const c = COLORS[s.segment];
  return `<div class="popup-inner">
    <div class="popup-name">${s.nom}</div>
    <div class="popup-acteur" style="color:${c}">${s.acteur}</div>
    <div class="popup-segment">${segmentLabel[s.segment]} · ${s.dept}</div>
  </div>`;
}

const markersMap = {};
SITES.forEach(s => {
  const m = L.marker([s.lat, s.lng], { icon: makeIcon(s) })
    .bindPopup(makePopup(s), { maxWidth: 240, minWidth: 180 });
  markersMap[s.id] = { marker: m, site: s, visible: true };
});

function matchFilter(s, f) {
  if (f === 'verre') return s.segment !== 'artelia';
  if (f === 'all') return true;
  if (f === 'verre') return s.segment !== 'artelia';
  return s.segment === f;
}

function updateCounts() {
  ['all','verre','creux','plat','laine','artelia'].forEach(f => {
    const el = document.getElementById('count-' + f);
    if (el) el.textContent = SITES.filter(s => matchFilter(s, f)).length;
  });
}

function renderList(filter) {
  const list = document.getElementById('sitesList');
  const filtered = SITES.filter(s => matchFilter(s, filter));
  document.getElementById('list-count').textContent = filtered.length;
  if (!filtered.length) { list.innerHTML = '<div class="no-results">Aucun site</div>'; return; }
  list.innerHTML = filtered.map(s => {
    const c = COLORS[s.segment];
    return `<div class="site-item" data-id="${s.id}" style="border-left-color:${c}">
      <div class="site-name">${s.nom}</div>
      <div class="site-meta">${s.acteur}</div>
    </div>`;
  }).join('');
  list.querySelectorAll('.site-item').forEach(el => {
    el.addEventListener('click', () => {
      const e = markersMap[el.dataset.id];
      if (e && e.visible) {
        map.setView([e.site.lat, e.site.lng], 11, { animate: true });
        setTimeout(() => e.marker.openPopup(), 350);
      }
    });
  });
}

function applyFilter(filter) {
  Object.values(markersMap).forEach(({ marker, site }) => {
    const show = matchFilter(site, filter);
    show ? (!map.hasLayer(marker) && marker.addTo(map)) : (map.hasLayer(marker) && map.removeLayer(marker));
    markersMap[site.id].visible = show;
  });
  renderList(filter);
}

updateCounts();
applyFilter('all');

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    applyFilter(this.dataset.filter);
  });
});
</script>
</body>
